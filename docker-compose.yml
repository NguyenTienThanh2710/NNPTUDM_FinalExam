services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: "5000"
      MONGO_URI: mongodb://mongo:27017/nnptudm_finalexam
      JWT_SECRET: dev-secret
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    restart: unless-stopped
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  mongo_data:

